<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MPG Calculator - Sie L Pale</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 80px;
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

            button:hover {
                background: #0056b3;
            }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <main>
        <div class="container">

            <!-- Logo (use your local image) -->
            <img src="https://cdn-icons-png.flaticon.com/512/743/743131.png" alt="Calculator Logo">
            <img src="images/calculator.png" alt="Calculator Logo">

            <h2>Sie L Pale</h2>
            <h3>MPG Calculator</h3>

            <!-- Inputs -->
            <input type="number" id="miles" placeholder="Miles Traveled">
            <input type="number" id="gallons" placeholder="Gallons Used">

            <!-- Button -->
            <button onclick="calculateMPG()">Calculate MPG</button>

            <!-- Output -->
            <div id="result"></div>

            <!-- Extra info -->
            <p class="footer">
                Enter miles and gallons to calculate fuel efficiency
            </p>

        </div>
    </main>

    <script>
        function calculateMPG() {
            let miles = document.getElementById("miles").value;
            let gallons = document.getElementById("gallons").value;

            if (miles === "" || gallons === "") {
                document.getElementById("result").innerHTML = "Please enter both values.";
                return;
            }

            let mpg = miles / gallons;

            document.getElementById("result").innerHTML =
                "Miles Per Gallon: " + mpg.toFixed(2);
        }
    </script>

</body>
</html>
